<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Joker - History</title>
        <link rel="stylesheet" href="assets/css/app.css">
    </head>
    <body class="dark-bg">
        <!-- Reward history — separate page; close/help links return to index.html -->
        <main  class="main-app history-main">
            <div class="history-content">
                <div class="history-title">
                    <a href="index.html" aria-label="Help"><img src="assets/images/question-icon.png" alt=""></a>
                    <h4>Reward History</h4>
                    <a href="index.html" aria-label="Close"><img src="assets/images/close.png" alt=""></a>
                </div>
                <div class="reward-box">
                    <img src="assets/images/bg-shp-1.png" class="box-shp-bg" alt="">
                    <h4 class="text-gradient">Total Reward</h4>
                    <h2 class="text-gradient">RM 3704</h2>
                </div>
                <div class="rewards-container">
                    <div class="filter-tabs">
                      <button class="tab-btn active">ALL</button>
                      <button class="tab-btn">THIS MONTH</button>
                    </div>
                
                    <table class="rewards-table">
                      <thead>
                        <tr>
                          <th class="text-left">DATE</th>
                          <th class="text-right">REWARD</th>
                        </tr>
                      </thead>
                      <tbody>
                        <tr>
                          <td class="text-left">2026-06-11 <span class="time-text">14:30:25</span></td>
                          <td class="text-right reward-amount">RM 888</td>
                        </tr>

                          <td class="text-left">2026-06-12 <span class="time-text">14:30:25</span></td>
                          <td class="text-right reward-amount">RM 588</td>
                        </tr>

                          <td class="text-left">2026-06-13 <span class="time-text">14:30:25</span></td>

                          <td class="text-left">2026-06-14 <span class="time-text">14:30:25</span></td>
                          <td class="text-right reward-amount">RM 288</td>
                        </tr>
                        <tr>
                          <td class="text-left">2026-06-15 <span class="time-text">14:30:25</span></td>
                          <td class="text-right reward-amount">RM 888</td>
                        </tr>
                        <tr>
                          <td class="text-left">2026-06-16 <span class="time-text">14:30:25</span></td>

                        </tr>
                      </tbody>
                    </table>
                
                    <div class="pagination">
                      <button class="nav-btn" aria-label="Previous page">
                        <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
                      </button>
                      <span class="page-indicator">1 / 10</span>
